<html layout:decorate="~{layout}">
<div layout:fragment="content" class="container my-3">
	<h2 class="border-bottom py-2" th:text="${question.subject}"></h2>
	<div class="card my-3">
		<div class="card-body">
			<div class="card-text" style="white-space: pre-line;" th:text="${question.content}"></div>
			<div class="d-flex justify-content-end">
				<div class="badge bg-light text-dark p-2 text-start">
					<div th:text="${#temporals.format(question.createDate, 'yyyy-MM-dd HH:mm')}"></div>
				</div>
			</div>
		</div>
	</div>
	<a th:href="@{|/question/modify/${question.id}|}" class="btn btn-outline-primary">수정</a>
	<a th:href="@{|/question/delete/${question.id}|}" class="btn btn-outline-danger"
	   		onclick="return confirm('정말 삭제하시겠습니까?');">삭제
	</a>
	<h5 class="border-bottom my-3 py-2" th:text="|답변: ${#lists.size(question.answers)}개|"></h5>
	<div class="card my-3" th:each="answer : ${question.answers}">
		<div class="card-body">
			<div class="card-text" style="white-space: pre-line;" th:text="${answer.content}"></div>
			<div class="d-flex justify-content-end">
				<div class="badge bg-light text-dark p-2 text-start">
					<div th:text="${#temporals.format(answer.createDate, 'yyyy-MM-dd HH:mm')}"></div>
				</div>
			</div>
		</div>
	</div>
	<form th:action="@{|/answer/create/${question.id}|}" method="post" class="my-3">
		<textarea name="content" id="content" rows="10" class="form-control"></textarea>
		<input type="submit" value="답하기" class="btn btn-light my-2">
		<a th:href="@{/question/list}" class="btn btn-secondary">취소</a>
	</form>
</div>
