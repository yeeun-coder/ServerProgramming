<html layout:decorate="~{layout}">
<div layout:fragment="content" class="container my-3">
	<table class="table">
		<thead class="table-light">
			<tr>
				<th>번호</th>
				<th>제목</th>
				<th>작성일시</th>
			</tr>
		</thead>
		<tbody>
			<!-- <tr th:each="question: ${questionList}"> -->
			<!-- <tr th:each="question, loop: ${questionList}"> -->
			<tr th:each="question, loop: ${paging}">
				<!-- <td th:text="${loop.count}"></td> -->
				<td th:text="${paging.getTotalElements - (paging.number * paging.size) -loop.index}"></td>
				<!-- <td th:text="${question.id}"></td> -->
				<td>
					<a th:href="@{|/question/detail/${question.id}|}" th:text="${question.subject}"></a>
					<span class="badge bg-light text-dark small ms-2"
							th:if="${#lists.size(question.answers) > 0}"
							th:text="${#lists.size(question.answers)}"></span>
				</td>
				<!-- <td th:text="${question.subject}"></td> -->
				<!-- <td th:text="${question.createDate}"></td> -->
				<td th:text="${#temporals.format(question.createDate, 'yyyy-MM-dd HH:mm')}"></td>
			</tr>
		</tbody>
	</table>
	<div th:if="${!paging.isEmpty()}">
		<ul class="pagination justify-content-center">
			<li class="page-item" th:classappend="${!paging.hasPrevious} ? 'disabled'">
				<a class="page-link" th:href="@{|?page=${paging.number-1}|}">
					<span>이전</span>
				</a>
			</li>
			<li th:each="page: ${#numbers.sequence(0, paging.totalPages-1)}"
				th:if="${page >= paging.number-3 and page <= paging.number+3}"
				th:classappend="${page == paging.number} ? 'active'" class= "page-item">
				<a th:text="${page}" class="page-link" th:href="@{|?page=${page}|}"></a>
			</li>
			<li class="page-item" th:classappend="${!paging.hasNext} ? 'disabled'">
				<a class="page-link" th:href="@{|?page=${paging.number+1}|}">
					<span>다음</span>
				</a>
			</li>
		</ul>
	</div>
	<!-- <a th:href="@{/question/create}">질문 등록하기</a> -->
	<a th:href="@{/question/create}" class="btn btn-light">질문 등록하기</a>
</div>
</html>
